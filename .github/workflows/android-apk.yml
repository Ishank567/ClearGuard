name: Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    name: Build downloadable APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android platform
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: 8.14.3

      - name: Build debug APK
        run: gradle :app:assembleDebug --no-daemon

      # Compile-checks the minified release config (ProGuard/R8 rules) so a
      # broken rule is caught here instead of at release time. The APK is
      # unsigned and not published.
      - name: Verify release build
        run: gradle :app:assembleRelease --no-daemon

      - name: Prepare APK
        run: |
          mkdir -p release
          cp app/build/outputs/apk/debug/app-debug.apk release/ShieldDNS-debug.apk

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: ShieldDNS-debug-apk
          path: release/ShieldDNS-debug.apk
          if-no-files-found: error

      - name: Publish latest GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete latest --yes --cleanup-tag || true
          gh release create latest release/ShieldDNS-debug.apk \
            --target "$GITHUB_SHA" \
            --title "ShieldDNS latest APK" \
            --notes "Installable debug APK built from commit $GITHUB_SHA. This APK is generated by GitHub Actions and contains no analytics or telemetry SDKs."
