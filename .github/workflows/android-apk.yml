name: Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    name: Build downloadable APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2

      - name: Build debug APK
        run: gradle :app:assembleDebug --no-daemon

      - name: Prepare APK
        run: |
          mkdir -p release
          cp app/build/outputs/apk/debug/app-debug.apk release/ClearGuard-debug.apk

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClearGuard-debug-apk
          path: release/ClearGuard-debug.apk
          if-no-files-found: error

      - name: Publish latest GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete latest --yes --cleanup-tag || true
          gh release create latest release/ClearGuard-debug.apk \
            --target "$GITHUB_SHA" \
            --title "ClearGuard latest APK" \
            --notes "Installable debug APK built from commit $GITHUB_SHA. This APK is generated by GitHub Actions and contains no analytics or telemetry SDKs."
